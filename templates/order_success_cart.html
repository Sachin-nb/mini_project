<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Qualitron - Order Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1f2937, #111827);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card-box {
            width: 460px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-img {
            width: 260px;
            height: 260px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,255,255,0.25);
            border: 5px solid rgba(255,255,255,0.7);
            transition: 0.3s;
        }

        .qr-img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,255,255,0.45);
        }

        .btn-modern {
            padding: 13px;
            background: linear-gradient(135deg, #12c2e9, #06a6c5, #007cf0);
            border: none;
            border-radius: 45px;
            font-size: 1.15rem;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 163, 255, 0.4);
        }

        #success_section h2 {
            animation: pop 0.6s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- Payment Box -->
<div id="payment_section" class="card-box text-center">
    <h2 class="fw-bold mb-2">Complete Your Payment</h2>
    <p class="text-light mb-4">Scan the QR code to continue your purchase</p>

    <img src="{{ url_for('static', filename='images/Scan.jpg') }}" class="qr-img mb-4" alt="QR">

    <p class="fw-semibold mb-1">UPI ID</p>
    <h4 class="text-info fw-bold">9980307550-2@axl</h4>

    <button class="btn-modern w-100 mt-4" onclick="showSuccess()">Payment Done ✓</button>
</div>

<!-- Success Box -->
<div id="success_section" class="card-box text-center d-none">
    <h2 class="fw-bold text-success">🎉 Order Successfully Placed!</h2>
    <p class="mt-2 text-light">Thank you for your payment.</p>

    <h5 class="mt-4 text-white-50">Estimated Delivery Date</h5>
    <h3 id="delivery_date" class="fw-bold text-warning"></h3>

    <a href="/invoice" class="btn-modern w-100 mt-4">View Invoice 🧾</a>
<a href="/" class="btn-modern w-100 mt-3">Return to Home</a>

</div>

<script>
function showSuccess() {
    document.getElementById("payment_section").classList.add("d-none");
    document.getElementById("success_section").classList.remove("d-none");

    let date = new Date();
    date.setDate(date.getDate() + 7);
    document.getElementById("delivery_date").innerText = date.toLocaleDateString("en-IN", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
    });
}
</script>

</body>
</html>
