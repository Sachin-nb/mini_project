<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="fw-bold mb-4 text-primary">Checkout</h2>

    <table class="table table-bordered bg-white">
        <thead>
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            {% for item in cart %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.quantity }}</td>
                <td>₹{{ item.price * item.quantity }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <h4 class="text-success">Total Amount: ₹{{ total_price }}</h4>
    <hr>

    <form method="POST" action="/place-order">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" required class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" name="phone" required class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">UPI ID / Payment Method</label>
            <input type="text" name="payment" required class="form-control">
        </div>
        <button class="btn btn-success w-100">Place Order</button>
    </form>
</div>
</body>
</html>
